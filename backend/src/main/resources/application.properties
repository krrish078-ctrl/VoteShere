spring.application.name=online-voting-backend
server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/online_voting?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jackson.time-zone=UTC

jwt.secret=${JWT_SECRET:change_this_to_a_long_secure_secret_at_least_32_characters}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.voting-link-base=${APP_VOTING_LINK_BASE:http://localhost:3000/e}
app.election-autoclose-ms=${APP_ELECTION_AUTOCLOSE_MS:10000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:https://*.vercel.app,https://*.netlify.app}
app.seed-admin.username=${APP_SEED_ADMIN_USERNAME:admin}
app.seed-admin.password=${APP_SEED_ADMIN_PASSWORD:admin123}

logging.level.org.springframework.security=INFO
