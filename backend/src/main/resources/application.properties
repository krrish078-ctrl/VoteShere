spring.application.name=online-voting-backend
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/online_voting?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.jackson.time-zone=UTC

jwt.secret=change_this_to_a_long_secure_secret_at_least_32_characters
jwt.expiration=86400000

app.voting-link-base=http://localhost:3000/e
app.election-autoclose-ms=10000
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-origin-patterns=https://*.vercel.app,https://*.netlify.app
app.seed-admin.username=admin
app.seed-admin.password=admin123

logging.level.org.springframework.security=INFO
